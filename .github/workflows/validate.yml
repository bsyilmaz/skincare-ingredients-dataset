name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build dataset from source
        run: python3 scripts/build.py
      - name: Validate schema & integrity
        run: python3 scripts/validate.py
      - name: Ensure generated files are up to date
        run: |
          if [ -n "$(git status --porcelain data/ demo/index.html)" ]; then
            echo "::error::Generated files are out of date. Run 'python3 scripts/build.py' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
